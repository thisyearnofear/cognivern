# Source-of-truth for the live nginx config at
# /etc/nginx/sites-enabled/cognivern on snel-bot. Tracking it in the repo so
# a recurrence of the 502-everywhere outage (proxy_pass was stale at :10000
# while the backend listens on :3087) can be diagnosed and re-applied.
#
# To re-apply manually:
#   sudo cp deploy/nginx/cognivern.conf /etc/nginx/sites-enabled/cognivern
#   sudo nginx -t && sudo systemctl reload nginx
#
# The upstream port MUST match $PORT in /opt/cognivern/shared/.env (3087).
# The Certbot-managed SSL lines below should not be hand-edited — let
# Certbot regenerate them on renewal.

server {
    server_name cognivern.thisyearnofear.com;

    location / {
        proxy_pass http://127.0.0.1:3087;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/cognivern.thisyearnofear.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/cognivern.thisyearnofear.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = cognivern.thisyearnofear.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    server_name cognivern.thisyearnofear.com;

    listen 80;
    return 404; # managed by Certbot


}