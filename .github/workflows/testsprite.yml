name: TestSprite Verification

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_API_KEY }}
  PROJECT_ID: ad5aa683-dbc5-4484-8236-e4a3aef914ee

jobs:
  verify:
    name: TestSprite — verify backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install TestSprite CLI
        run: npm install -g @testsprite/testsprite-cli

      - name: Run all backend tests
        run: |
          testsprite test run --all --project "$PROJECT_ID" \
            --wait --timeout 300 --output json

      - name: Download failure bundles on failure
        if: failure()
        run: |
          # Pull failure artifacts for any failed runs
          testsprite test list --project "$PROJECT_ID" --status failed --output json | \
            jq -r '.items[].lastRunId // empty' | \
            while read -r runId; do
              testsprite test artifact get "$runId" \
                --out ".testsprite/runs/${runId}" || true
            done

      - name: Upload failure bundles
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: testsprite-failures
          path: .testsprite/runs/
          retention-days: 7
