name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "config/**"
      - "tsconfig*.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "!src/frontend/**"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "config/**"
      - "tsconfig*.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "!src/frontend/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build backend
        run: pnpm run build

      - name: Run integration tests
        run: pnpm run test:integration
