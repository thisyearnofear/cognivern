# Scripts/test package — depends on the templates package DAR plus daml-script.
# This package is NEVER uploaded to a participant; it exists only so `daml test`
# (and local sandbox seeding) can exercise the templates without pulling
# daml-script into the on-ledger cognivern-auction package.
sdk-version: 3.4.11
name: daml-scripts
source: daml
version: 0.0.2
dependencies:
  - daml-prim
  - daml-stdlib
  - daml-script
data-dependencies:
  - ../.daml/dist/daml-0.0.2.dar
